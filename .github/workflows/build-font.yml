name: Build and Release Font

# Triggered by version tags (e.g. v2.0.0)
# To release: git tag v2.0.0 && git push origin v2.0.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v2.0.0)"
        required: false
        default: "v0.0.0-test"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Iosevka source
        uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          path: iosevka-src
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ttfautohint python3 fontforge

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build font
        run: |
          cp private-build-plans.toml iosevka-src/
          cd iosevka-src
          npm install
          npm run build -- contents::IoskeleyMono contents::IoskeleyMonoTerm contents::IoskeleyMonoNL

      - name: Verify build output
        run: |
          if [ ! -d "iosevka-src/dist/IoskeleyMono/TTF" ] || [ ! -d "iosevka-src/dist/IoskeleyMono/WOFF2" ]; then
            echo "IoskeleyMono build output not found!"
            exit 1
          fi
          if [ ! -d "iosevka-src/dist/IoskeleyMonoTerm/TTF" ]; then
            echo "IoskeleyMonoTerm build output not found!"
            exit 1
          fi
          if [ ! -d "iosevka-src/dist/IoskeleyMonoNL/TTF" ]; then
            echo "IoskeleyMonoNL build output not found!"
            exit 1
          fi

      - name: Download Nerd Fonts patcher
        run: |
          curl -sL "$(gh api repos/ryanoasis/nerd-fonts/releases/latest --jq '.assets[] | select(.name == "FontPatcher.zip") | .browser_download_url')" -o FontPatcher.zip
          unzip -q FontPatcher.zip -d nerd-fonts-patcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Iosevka encodes the width inside the weight name:
      #   Normal        → IoskeleyMono-{Weight}.ttf
      #   SemiCondensed → IoskeleyMono-SemiCondensed{Weight}.ttf
      #   Condensed     → IoskeleyMono-Condensed{Weight}.ttf
      - name: Patch fonts with Nerd Font glyphs
        run: |
          mkdir -p patched-fonts/Normal patched-fonts/SemiCondensed patched-fonts/Condensed
          mkdir -p patched-fonts-term/Normal patched-fonts-term/SemiCondensed patched-fonts-term/Condensed
          mkdir -p patched-fonts-nl/Normal patched-fonts-nl/SemiCondensed patched-fonts-nl/Condensed
          DIST="iosevka-src/dist/IoskeleyMono/TTF"
          DIST_TERM="iosevka-src/dist/IoskeleyMonoTerm/TTF"
          DIST_NL="iosevka-src/dist/IoskeleyMonoNL/TTF"
          PATCHER="nerd-fonts-patcher/font-patcher"

          for font in "$DIST"/IoskeleyMono-SemiCondensed*.ttf; do
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/SemiCondensed
          done

          for font in "$DIST"/IoskeleyMono-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/Condensed
          done

          for font in "$DIST"/IoskeleyMono-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts/Normal
          done

          for font in "$DIST_TERM"/IoskeleyMonoTerm-SemiCondensed*.ttf; do
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-term/SemiCondensed
          done

          for font in "$DIST_TERM"/IoskeleyMonoTerm-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-term/Condensed
          done

          for font in "$DIST_TERM"/IoskeleyMonoTerm-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-term/Normal
          done

          for font in "$DIST_NL"/IoskeleyMonoNL-SemiCondensed*.ttf; do
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-nl/SemiCondensed
          done

          for font in "$DIST_NL"/IoskeleyMonoNL-Condensed*.ttf; do
            [[ "$font" == *SemiCondensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-nl/Condensed
          done

          for font in "$DIST_NL"/IoskeleyMonoNL-*.ttf; do
            [[ "$font" == *Condensed* ]] && continue
            fontforge -script "$PATCHER" "$font" --complete --careful --outputdir patched-fonts-nl/Normal
          done

      - name: Package release archives
        run: |
          DIST="iosevka-src/dist/IoskeleyMono"
          DIST_TERM="iosevka-src/dist/IoskeleyMonoTerm"

          # ── IoskeleyMono.zip — all widths, TTF hinted + unhinted ──────────
          mkdir -p pkg/Normal/Hinted      pkg/Normal/Unhinted
          mkdir -p pkg/SemiCondensed/Hinted pkg/SemiCondensed/Unhinted
          mkdir -p pkg/Condensed/Hinted   pkg/Condensed/Unhinted

          cp "$DIST"/TTF/IoskeleyMono-SemiCondensed*.ttf          pkg/SemiCondensed/Hinted/
          cp "$DIST"/TTF-Unhinted/IoskeleyMono-SemiCondensed*.ttf pkg/SemiCondensed/Unhinted/

          for f in "$DIST"/TTF/IoskeleyMono-Condensed*.ttf;          do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg/Condensed/Hinted/;    done
          for f in "$DIST"/TTF-Unhinted/IoskeleyMono-Condensed*.ttf; do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg/Condensed/Unhinted/;  done
          for f in "$DIST"/TTF/IoskeleyMono-*.ttf;                   do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg/Normal/Hinted/;        done
          for f in "$DIST"/TTF-Unhinted/IoskeleyMono-*.ttf;          do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg/Normal/Unhinted/;      done

          cd pkg && zip -r ../IoskeleyMono.zip . && cd ..

          # ── IoskeleyMono-NerdFont.zip — all widths, Nerd Font patched ─────
          mkdir -p pkg-nf/Normal pkg-nf/SemiCondensed pkg-nf/Condensed
          cp patched-fonts/Normal/*.ttf         pkg-nf/Normal/
          cp patched-fonts/SemiCondensed/*.ttf  pkg-nf/SemiCondensed/
          cp patched-fonts/Condensed/*.ttf      pkg-nf/Condensed/
          cd pkg-nf && zip -r ../IoskeleyMono-NerdFont.zip . && cd ..

          # ── IoskeleyMono-Term.zip — all widths, term spacing ──────────────
          mkdir -p pkg-term/Normal/Hinted      pkg-term/Normal/Unhinted
          mkdir -p pkg-term/SemiCondensed/Hinted pkg-term/SemiCondensed/Unhinted
          mkdir -p pkg-term/Condensed/Hinted   pkg-term/Condensed/Unhinted

          cp "$DIST_TERM"/TTF/IoskeleyMonoTerm-SemiCondensed*.ttf          pkg-term/SemiCondensed/Hinted/
          cp "$DIST_TERM"/TTF-Unhinted/IoskeleyMonoTerm-SemiCondensed*.ttf pkg-term/SemiCondensed/Unhinted/

          for f in "$DIST_TERM"/TTF/IoskeleyMonoTerm-Condensed*.ttf;          do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg-term/Condensed/Hinted/;   done
          for f in "$DIST_TERM"/TTF-Unhinted/IoskeleyMonoTerm-Condensed*.ttf; do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg-term/Condensed/Unhinted/; done
          for f in "$DIST_TERM"/TTF/IoskeleyMonoTerm-*.ttf;                   do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg-term/Normal/Hinted/;       done
          for f in "$DIST_TERM"/TTF-Unhinted/IoskeleyMonoTerm-*.ttf;          do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg-term/Normal/Unhinted/;     done

          cd pkg-term && zip -r ../IoskeleyMono-Term.zip . && cd ..

          # ── IoskeleyMono-NL.zip — all widths, no ligatures ────────────────
          DIST_NL="iosevka-src/dist/IoskeleyMonoNL"
          mkdir -p pkg-nl/Normal/Hinted      pkg-nl/Normal/Unhinted
          mkdir -p pkg-nl/SemiCondensed/Hinted pkg-nl/SemiCondensed/Unhinted
          mkdir -p pkg-nl/Condensed/Hinted   pkg-nl/Condensed/Unhinted

          cp "$DIST_NL"/TTF/IoskeleyMonoNL-SemiCondensed*.ttf          pkg-nl/SemiCondensed/Hinted/
          cp "$DIST_NL"/TTF-Unhinted/IoskeleyMonoNL-SemiCondensed*.ttf pkg-nl/SemiCondensed/Unhinted/

          for f in "$DIST_NL"/TTF/IoskeleyMonoNL-Condensed*.ttf;          do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg-nl/Condensed/Hinted/;   done
          for f in "$DIST_NL"/TTF-Unhinted/IoskeleyMonoNL-Condensed*.ttf; do [[ "$f" == *SemiCondensed* ]] && continue; cp "$f" pkg-nl/Condensed/Unhinted/; done
          for f in "$DIST_NL"/TTF/IoskeleyMonoNL-*.ttf;                   do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg-nl/Normal/Hinted/;       done
          for f in "$DIST_NL"/TTF-Unhinted/IoskeleyMonoNL-*.ttf;          do [[ "$f" == *Condensed* ]]     && continue; cp "$f" pkg-nl/Normal/Unhinted/;     done

          cd pkg-nl && zip -r ../IoskeleyMono-NL.zip . && cd ..

          # ── IoskeleyMono-Term-NerdFont.zip — term spacing + Nerd Font ─────
          mkdir -p pkg-term-nf/Normal pkg-term-nf/SemiCondensed pkg-term-nf/Condensed
          cp patched-fonts-term/Normal/*.ttf         pkg-term-nf/Normal/
          cp patched-fonts-term/SemiCondensed/*.ttf  pkg-term-nf/SemiCondensed/
          cp patched-fonts-term/Condensed/*.ttf      pkg-term-nf/Condensed/
          cd pkg-term-nf && zip -r ../IoskeleyMono-Term-NerdFont.zip . && cd ..

          # ── IoskeleyMono-NL-NerdFont.zip — no ligatures + Nerd Font ───────
          mkdir -p pkg-nl-nf/Normal pkg-nl-nf/SemiCondensed pkg-nl-nf/Condensed
          cp patched-fonts-nl/Normal/*.ttf         pkg-nl-nf/Normal/
          cp patched-fonts-nl/SemiCondensed/*.ttf  pkg-nl-nf/SemiCondensed/
          cp patched-fonts-nl/Condensed/*.ttf      pkg-nl-nf/Condensed/
          cd pkg-nl-nf && zip -r ../IoskeleyMono-NL-NerdFont.zip . && cd ..

      - name: Package Web archive
        run: |
          cd iosevka-src/dist/IoskeleyMono
          zip -r ../../../IoskeleyMono-Web.zip WOFF2 WOFF2-Unhinted

      - name: Set release version
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Ioskeley Mono ${{ steps.vars.outputs.tag }}"
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          body: |
            ## Ioskeley Mono ${{ steps.vars.outputs.tag }}

            <!-- What's new in this release -->

            ---

            ### Downloads

            | Situation | Download |
            |---|---|
            | Editor / IDE | `IoskeleyMono.zip` |
            | Terminal with icons | `IoskeleyMono-NerdFont.zip` |
            | Terminal rendering issues | `IoskeleyMono-Term.zip` |
            | Terminal icons + rendering issues | `IoskeleyMono-Term-NerdFont.zip` |
            | App that can't disable ligatures | `IoskeleyMono-NL.zip` |
            | Same + Nerd Font icons | `IoskeleyMono-NL-NerdFont.zip` |
            | Web | `IoskeleyMono-Web.zip` |

            Not sure which to pick? [See the README](https://github.com/ahatem/IoskeleyMono#which-file-do-i-need).
          files: |
            IoskeleyMono.zip
            IoskeleyMono-NerdFont.zip
            IoskeleyMono-Term.zip
            IoskeleyMono-Term-NerdFont.zip
            IoskeleyMono-NL.zip
            IoskeleyMono-NL-NerdFont.zip
            IoskeleyMono-Web.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}